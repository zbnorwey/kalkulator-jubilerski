<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jubiler Pro - Kalkulator</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3590/3590463.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        
        /* Layout aplikacji */
        .app-shell { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: white; }
        
        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); }
        header h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; }

        .content { padding: 15px; flex: 1; }

        /* Karty i interfejs */
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .mode-tab { display: flex; background: #e5e5ea; border-radius: 10px; padding: 3px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        .tab.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        label { display: block; font-size: 0.65rem; color: #8e8e93; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; border: 1px solid #d1d1d6; border-radius: 8px; padding: 12px; font-size: 1rem; box-sizing: border-box; background: #fafafa; }
        
        .mass-badge { display: inline-block; margin-top: 8px; padding: 4px 10px; background: #f8f9fa; border-radius: 6px; font-weight: bold; font-size: 0.9rem; color: var(--dark); }

        /* Podsumowanie dolne */
        .sticky-summary { background: var(--dark); color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; position: sticky; bottom: 0; z-index: 10; border-radius: 15px 15px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .total-price { color: var(--gold); font-size: 1.4rem; font-weight: 800; }
        .total-label { font-size: 0.6rem; opacity: 0.7; display: block; letter-spacing: 1px; }

        .btn-pdf { background: #27ae60; color: white; border: none; width: 100%; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* Ukrywanie elementów w PDF */
        .no-pdf { display: block; }
        
        /* Specjalny styl dla PDF */
        #pdf-header-only { display: none; text-align: center; padding: 20px; background: #1a1a1a; color: white; border-bottom: 4px solid #d4af37; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="no-pdf">
        <h1>Kalkulator Obrączek</h1>
        <small id="display-date" style="opacity: 0.5;"></small>
    </header>

    <div class="content" id="pdf-area">
        <div id="pdf-header-only">
            <h2 style="margin:0; letter-spacing: 2px;">SPECYFIKACJA PROJEKTOWA</h2>
            <p id="pdf-date-val" style="font-size: 0.8rem; margin: 5px 0 0 0; opacity: 0.8;"></p>
        </div>

        <div class="mode-tab no-pdf">
            <div id="t-single" class="tab" onclick="setMode('single')">Jedna obrączka</div>
            <div id="t-pair" class="tab active" onclick="setMode('pair')">Para obrączek</div>
        </div>

        <div class="card">
            <div class="row">
                <div>
                    <label>Kruszec</label>
                    <select id="kruszec" onchange="oblicz()">
                        <option value="13.6">Złoto 585 (14K)</option>
                        <option value="15.5">Złoto 750 (18K)</option>
                        <option value="10.5">Srebro 925</option>
                        <option value="21.4">Platyna 950</option>
                    </select>
                </div>
                <div>
                    <label>Cena PLN/1g</label>
                    <input type="number" id="cenaGram" value="180" oninput="oblicz()">
                </div>
            </div>
        </div>

        <div class="card" id="card-a">
            <h3 style="margin: 0 0 15px 0; font-size: 1rem;">💍 Obrączka A (Damska)</h3>
            <div class="row">
                <div><label>Rozmiar PL</label><input type="number" id="r1_roz" value="12" oninput="oblicz()"></div>
                <div><label>Szerokość (mm)</label><input type="number" id="r1_szer" value="4" step="0.5" oninput="oblicz()"></div>
            </div>
            <div class="row">
                <div><label>Grubość (mm)</label><input type="number" id="r1_grub" value="1.3" step="0.1" oninput="oblicz()"></div>
                <div>
                    <label>Profil / Soczewka</label>
                    <select id="r1_mod" onchange="oblicz()">
                        <option value="1.0">Płaska / Brak</option>
                        <option value="1.12">Płaska + Socz.</option>
                        <option value="0.8">Półokr. / Brak</option>
                        <option value="0.95">Półokr. + Socz.</option>
                    </select>
                </div>
            </div>
            <div id="r1_masa" class="mass-badge">Masa: 0.00 g</div>
        </div>

        <div class="card" id="card-b">
            <h3 style="margin: 0 0 15px 0; font-size: 1rem;">💍 Obrączka B (Męska)</h3>
            <div class="row">
                <div><label>Rozmiar PL</label><input type="number" id="r2_roz" value="22" oninput="oblicz()"></div>
                <div><label>Szerokość (mm)</label><input type="number" id="r2_szer" value="5" step="0.5" oninput="oblicz()"></div>
            </div>
            <div class="row">
                <div><label>Grubość (mm)</label><input type="number" id="r2_grub" value="1.3" step="0.1" oninput="oblicz()"></div>
                <div>
                    <label>Profil / Soczewka</label>
                    <select id="r2_mod" onchange="oblicz()">
                        <option value="1.0">Płaska / Brak</option>
                        <option value="1.12">Płaska + Socz.</option>
                        <option value="0.8">Półokr. / Brak</option>
                        <option value="0.95">Półokr. + Socz.</option>
                    </select>
                </div>
            </div>
            <div id="r2_masa" class="mass-badge">Masa: 0.00 g</div>
        </div>

        <div class="card">
            <label>Dodatkowe notatki</label>
            <textarea id="notatki" placeholder="Wpisz grawer, termin, rodzaj matowania..."></textarea>
        </div>

        <button class="btn-pdf no-pdf" onclick="generatePDF()">💾 Generuj PDF do wydruku</button>
    </div>

    <div class="sticky-summary no-pdf">
        <div>
            <span class="total-label" id="label-masa">ŁĄCZNA MASA PARY</span>
            <span id="totalMasa" style="font-weight: bold; font-size: 1.1rem;">0.00 g</span>
        </div>
        <div style="text-align: right;">
            <span class="total-label">WARTOŚĆ MATERIAŁU</span>
            <span id="totalKoszt" class="total-price">0.00 zł</span>
        </div>
    </div>
</div>

<script>
    // Rejestracja PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    let currentMode = 'pair';
    const dzisiaj = new Date().toLocaleDateString('pl-PL');
    document.getElementById('display-date').innerText = dzisiaj;
    document.getElementById('pdf-date-val').innerText = "Data wyceny: " + dzisiaj;

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('card-b').style.display = (mode === 'single') ? 'none' : 'block';
        document.getElementById('t-single').classList.toggle('active', mode === 'single');
        document.getElementById('t-pair').classList.toggle('active', mode === 'pair');
        document.getElementById('label-masa').innerText = (mode === 'single') ? 'MASA OBRĄCZKI' : 'ŁĄCZNA MASA PARY';
        oblicz();
    }

    function liczMase(roz, szer, grub, mod) {
        const gestosc = parseFloat(document.getElementById('kruszec').value);
        const srednica = 12.33 + (roz * 0.333);
        const vol = Math.PI * (Math.pow((srednica/2 + grub), 2) - Math.pow((srednica/2), 2)) * szer;
        return (vol / 1000) * gestosc * mod;
    }

    function oblicz() {
        const m1 = liczMase(
            parseFloat(document.getElementById('r1_roz').value),
            parseFloat(document.getElementById('r1_szer').value),
            parseFloat(document.getElementById('r1_grub').value),
            parseFloat(document.getElementById('r1_mod').value)
        );
        
        let m2 = 0;
        if (currentMode === 'pair') {
            m2 = liczMase(
                parseFloat(document.getElementById('r2_roz').value),
                parseFloat(document.getElementById('r2_szer').value),
                parseFloat(document.getElementById('r2_grub').value),
                parseFloat(document.getElementById('r2_mod').value)
            );
            document.getElementById('r2_masa').innerText = `Masa: ${m2.toFixed(2)} g`;
        }
        
        const totalMasa = m1 + m2;
        const cena = parseFloat(document.getElementById('cenaGram').value) || 0;
        
        document.getElementById('r1_masa').innerText = `Masa: ${m1.toFixed(2)} g`;
        document.getElementById('totalMasa').innerText = `${totalMasa.toFixed(2)} g`;
        document.getElementById('totalKoszt').innerText = (totalMasa * cena).toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " zł";
    }

    function generatePDF() {
        const element = document.getElementById('pdf-area');
        const pdfHeader = document.getElementById('pdf-header-only');
        const noPdf = document.querySelectorAll('.no-pdf');

        // Przygotowanie widoku do "zdjęcia"
        pdfHeader.style.display = 'block';
        noPdf.forEach(el => el.style.display = 'none');
        
        // Sztywne wymiary dla html2pdf, aby uniknąć ucinania boków
        const originalWidth = element.style.width;
        element.style.width = "750px"; 

        const opt = {
            margin: [15, 10, 15, 10],
            filename: 'Wycena_Obraczek.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 2, useCORS: true, windowWidth: 800 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
            // Przywrócenie interfejsu aplikacji
            element.style.width = originalWidth;
            pdfHeader.style.display = 'none';
            noPdf.forEach(el => el.style.display = 'flex');
            // Naprawa display dla elementów które nie są flex
            document.querySelector('header').style.display = 'block';
            document.querySelector('.mode-tab').style.display = 'flex';
            setMode(currentMode); 
        });
    }

    oblicz();
</script>
</body>
</html>
