<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jubiler DS - Kalkulator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --gold: #d4af37; --dark: #1a1a1a; --bg: #f2f2f7; --sale: #e74c3c; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .app-shell { max-width: 600px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: white; }
        
        header { background: var(--dark); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; gap: 15px; }
        header img { height: 40px; width: auto; }
        header h1 { margin: 0; font-size: 1.1rem; letter-spacing: 1px; }

        .content { padding: 15px; flex: 1; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; }
        
        .mode-tab { display: flex; background: #e5e5ea; border-radius: 10px; padding: 3px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .tab.active { background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .row-triple { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        label { display: block; font-size: 0.7rem; color: #666; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        input, select, textarea { width: 100%; border: 1px solid #ccc; border-radius: 8px; padding: 12px; font-size: 1rem; box-sizing: border-box; background: #fff; -webkit-appearance: none; }
        
        .mass-label { display: block; margin-top: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; text-align: center; font-weight: 800; color: var(--dark); border: 1px dashed #ccc; }
        
        .sticky-summary { background: var(--dark); color: white; padding: 20px; display: flex; justify-content: space-between; position: sticky; bottom: 0; border-radius: 20px 20px 0 0; z-index: 100; align-items: center; }
        .btn-view { background: #27ae60; color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-top: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Style trybu podglądu */
        #preview-header { display: none; padding-bottom: 20px; border-bottom: 2px solid var(--gold); margin-bottom: 20px; }
        .preview-mode #preview-header { display: flex; align-items: center; justify-content: space-between; }
        .preview-mode .no-view { display: none !important; }
        .preview-mode input, .preview-mode select, .preview-mode textarea { 
            border: none !important; background: transparent !important; padding: 0 !important; font-weight: bold; font-size: 1.1rem; color: #000; pointer-events: none; 
        }
        .preview-mode .sticky-summary { background: #f9f9f9; color: #000; border-top: 4px solid var(--dark); border-radius: 0; }
        .preview-mode #totalKoszt { color: var(--sale) !important; }
        #discount-info { font-size: 0.8rem; color: var(--sale); font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="app-shell" id="app-root">
    <header class="no-view">
        <img src="logo-jubilerds.png" alt="Logo">
        <h1>JUBILER DS</h1>
    </header>

    <div class="content">
        <div id="preview-header">
            <img src="logo-jubilerds.png" style="height: 60px;">
            <div style="text-align: right;">
                <h2 style="margin:0; color:var(--gold); font-size: 18px;">OFERTA INDYWIDUALNA</h2>
                <p id="display-date" style="margin:5px 0 0 0; font-size: 12px;"></p>
            </div>
        </div>

        <div class="mode-tab no-view">
            <div id="t-single" class="tab" onclick="setMode('single')">Jedna</div>
            <div id="t-pair" class="tab active" onclick="setMode('pair')">Para</div>
        </div>

        <div class="card">
            <div class="row-triple">
                <div>
                    <label>Kruszec</label>
                    <select id="kruszec" onchange="oblicz()">
                        <option value="10.9">Złoto 333</option>
                        <option value="13.6" selected>Złoto 585</option>
                        <option value="15.5">Złoto 750</option>
						<option value="10.5">Srebro 925</option>
                    </select>
                </div>
                <div>
                    <label>Cena/1g</label>
                    <input type="number" id="cenaGram" value="" oninput="oblicz()">
                </div>
                <div>
                    <label>Rabat %</label>
                    <input type="number" id="rabatProcent" value="" min="0" max="100" oninput="oblicz()" style="color:var(--sale); font-weight:bold;">
                </div>
            </div>
        </div>

        <div class="card" id="card-a">
            <label style="color:var(--gold)">💍 Obrączka A</label>
            <div class="row">
                <div><label>Rozmiar</label><input type="number" id="r1_roz" value="" oninput="oblicz()"></div>
                <div><label>Szerokość</label><input type="number" id="r1_szer" value="" step="0.5" oninput="oblicz()"></div>
            </div>
            <div class="row">
                <div><label>Grubość</label><input type="number" id="r1_grub" value="" step="0.1" oninput="oblicz()"></div>
                <div><label>Profil</label>
                    <select id="r1_mod" onchange="oblicz()">
                        <option value="1.0">Płaska</option>
						<option value="0.93">Płaska + Faz.</option>
                        <option value="1.12">Płaska + Socz.</option>
						<option value="1.05">Płaska + Faz + Socz.</option>
                        <option value="0.8">Półokrągła</option>
                        <option value="0.95">Półokr. + Socz.</option>
						
                    </select>
                </div>
            </div>
            <div id="r1_w" class="mass-label">Masa: 0.00 g</div>
        </div>

        <div class="card" id="card-b">
            <label style="color:var(--gold)">💍 Obrączka B</label>
            <div class="row">
                <div><label>Rozmiar</label><input type="number" id="r2_roz" value="" oninput="oblicz()"></div>
                <div><label>Szerokość</label><input type="number" id="r2_szer" value="" step="0.5" oninput="oblicz()"></div>
            </div>
            <div class="row">
                <div><label>Grubość</label><input type="number" id="r2_grub" value="" step="0.1" oninput="oblicz()"></div>
                <div><label>Profil</label>
                    <select id="r2_mod" onchange="oblicz()">
                        <option value="1.0">Płaska</option>
						<option value="0.93">Płaska + Faz.</option>
                        <option value="1.12">Płaska + Socz.</option>
						<option value="1.05">Płaska + Faz + Socz.</option>
                        <option value="0.8">Półokrągła</option>
                        <option value="0.95">Półokr. + Socz.</option>
                    </select>
                </div>
            </div>
            <div id="r2_w" class="mass-label">Masa: 0.00 g</div>
        </div>

        <div class="card">
            <label>Uwagi i Grawer</label>
            <textarea id="notatki" rows="2"></textarea>
            <div id="discount-info" style="margin-top:10px;">Zastosowano rabat: <span id="val-discount">0</span>%</div>
        </div>
        
        <button class="btn-view no-view" onclick="togglePreview()">👁️ WIDOK DLA KLIENTA</button>
        <button class="btn-view" id="btn-back" style="display:none; background:#666;" onclick="togglePreview()">⬅ POWRÓT</button>
    </div>

    <div class="sticky-summary">
        <div id="totalMasa" style="font-weight:bold;">0.00 g</div>
        <div id="totalKoszt" style="color:var(--gold); font-weight:800; font-size:1.6rem">0.00 zł</div>
    </div>
</div>

<script>
    let mode = 'pair';
    
    function setMode(m) {
        mode = m;
        document.getElementById('card-b').style.display = m === 'single' ? 'none' : 'block';
        document.getElementById('t-single').className = m === 'single' ? 'tab active' : 'tab';
        document.getElementById('t-pair').className = m === 'pair' ? 'tab active' : 'tab';
        oblicz();
    }

    function oblicz() {
        const getV = (id) => parseFloat(document.getElementById(id).value) || 0;
        
        const g = getV('kruszec'), c = getV('cenaGram'), r = getV('rabatProcent');
        const f = (roz, s, gr, m) => {
            if(roz <= 0 || s <= 0 || gr <= 0) return 0;
            const sr = 12.33 + (roz * 0.333);
            return (Math.PI * (Math.pow(sr/2+gr, 2) - Math.pow(sr/2, 2)) * s * g / 1000) * m;
        };

        const m1 = f(getV('r1_roz'), getV('r1_szer'), getV('r1_grub'), getV('r1_mod'));
        const m2 = mode === 'pair' ? f(getV('r2_roz'), getV('r2_szer'), getV('r2_grub'), getV('r2_mod')) : 0;
        
        document.getElementById('r1_w').innerText = `Masa: ${m1.toFixed(2)} g`;
        if(mode === 'pair') document.getElementById('r2_w').innerText = `Masa: ${m2.toFixed(2)} g`;
        
        const tm = m1 + m2;
        let cenaKoncowa = tm * c;
        if(r > 0) cenaKoncowa = cenaKoncowa * (1 - r/100);

        document.getElementById('totalMasa').innerText = tm.toFixed(2) + " g";
        document.getElementById('totalKoszt').innerText = cenaKoncowa.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " zł";
        
        document.getElementById('val-discount').innerText = r;
        document.getElementById('discount-info').style.display = r > 0 ? 'block' : 'none';
    }

    function togglePreview() {
        const root = document.getElementById('app-root');
        const isPreview = root.classList.toggle('preview-mode');
        document.getElementById('btn-back').style.display = isPreview ? 'block' : 'none';
        document.getElementById('display-date').innerText = "Data: " + new Date().toLocaleDateString();
        window.scrollTo(0,0);
    }
    setTimeout(oblicz, 100);
</script>
</body>
</html>
